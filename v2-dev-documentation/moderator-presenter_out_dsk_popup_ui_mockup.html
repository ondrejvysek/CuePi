<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Presenter Out / DSK</title>
  <style>
    :root {
      --bg: #07101f;
      --modal: #0b1628;
      --modal-soft: #0f1d32;
      --card: rgba(13, 29, 50, 0.82);
      --card-strong: rgba(10, 22, 39, 0.92);
      --border: rgba(145, 174, 210, 0.24);
      --border-strong: rgba(170, 198, 232, 0.36);
      --text: #f4f7fb;
      --muted: #b9c6d8;
      --muted-2: #7f91aa;
      --blue: #0f73ff;
      --blue-2: #1a8cff;
      --blue-glow: rgba(15, 115, 255, 0.34);
      --btn-dark: #17273b;
      --danger: #ff313d;
      --warn: #ff7a12;
      --ok: #f5f5f5;
      --panel-color: #090807;
      --shadow: 0 26px 80px rgba(0, 0, 0, 0.48);
      --radius-xl: 18px;
      --radius-lg: 13px;
      --radius-md: 9px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at 30% 8%, rgba(36, 99, 170, 0.22), transparent 34%),
        radial-gradient(circle at 80% 20%, rgba(23, 84, 145, 0.16), transparent 32%),
        linear-gradient(180deg, #06101e 0%, #050b15 100%);
      display: grid;
      place-items: center;
      padding: 36px;
    }

    button,
    select,
    input {
      font: inherit;
    }

    .modal {
      width: min(1180px, 100%);
      background:
        linear-gradient(145deg, rgba(13, 28, 49, 0.98), rgba(6, 16, 31, 0.98)),
        var(--modal);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      padding: 26px;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .modal-title {
      margin: 0;
      font-size: clamp(26px, 3vw, 35px);
      line-height: 1;
      letter-spacing: 0.045em;
      font-weight: 850;
      text-transform: uppercase;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
    }

    .close-button {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: var(--text);
      font-size: 34px;
      line-height: 1;
      cursor: pointer;
      opacity: 0.92;
    }

    .close-button:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(420px, 1fr) minmax(420px, 1fr);
      gap: 14px;
      align-items: stretch;
    }

    .left-stack {
      display: grid;
      gap: 14px;
    }

    .card {
      background:
        linear-gradient(145deg, rgba(15, 33, 56, 0.86), rgba(8, 21, 38, 0.92));
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #e8eef8;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .icon {
      width: 25px;
      height: 25px;
      display: inline-grid;
      place-items: center;
      color: #f1f6ff;
      opacity: 0.96;
    }

    .field-group {
      display: grid;
      gap: 9px;
      margin-bottom: 14px;
    }

    .label {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.2;
    }

    .select-wrap {
      position: relative;
    }

    select {
      width: 100%;
      min-height: 48px;
      appearance: none;
      background: rgba(5, 15, 29, 0.76);
      color: var(--text);
      border: 1px solid rgba(161, 189, 224, 0.24);
      border-radius: var(--radius-md);
      padding: 0 46px 0 16px;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .select-wrap::after {
      content: "⌄";
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-54%);
      color: #e8f1ff;
      font-size: 26px;
      pointer-events: none;
      line-height: 1;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 10px 0 18px;
    }

    .button {
      min-height: 44px;
      border: 1px solid rgba(172, 200, 236, 0.2);
      border-radius: 8px;
      padding: 0 18px;
      color: var(--text);
      font-weight: 800;
      letter-spacing: 0.025em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
    }

    .button.secondary {
      background: linear-gradient(180deg, #1a2b41, #152337);
      color: #eef5ff;
    }

    .button.primary,
    .button.apply {
      background: linear-gradient(180deg, #1d7cff, #075cf5);
      border-color: rgba(81, 156, 255, 0.7);
      box-shadow: 0 8px 26px var(--blue-glow), inset 0 1px 0 rgba(255, 255, 255, 0.16);
    }

    .button.apply {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
    }

    .button:hover {
      filter: brightness(1.06);
    }

    .hdmi-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
    }

    .hint {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .placement-content {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 26px;
      align-items: center;
    }

    .anchor-grid {
      display: grid;
      grid-template-columns: repeat(3, 64px);
      gap: 8px;
    }

    .anchor-button {
      width: 64px;
      height: 54px;
      border: 1px solid rgba(154, 187, 226, 0.24);
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(9, 22, 39, 0.95), rgba(8, 17, 32, 0.95));
      color: #f1f7ff;
      font-size: 27px;
      line-height: 1;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .anchor-button.active {
      background: linear-gradient(180deg, #127eff, #075cf7);
      border-color: #248dff;
      box-shadow: 0 10px 24px var(--blue-glow), inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .slider-stack {
      display: grid;
      gap: 28px;
    }

    .slider-row {
      display: grid;
      grid-template-columns: 1fr 82px;
      gap: 16px;
      align-items: end;
    }

    .slider-main {
      display: grid;
      gap: 10px;
    }

    input[type="range"] {
      width: 100%;
      height: 5px;
      appearance: none;
      background: linear-gradient(90deg, var(--blue-2) 0 44%, rgba(125, 151, 184, 0.36) 44% 100%);
      border-radius: 999px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 17px;
      height: 17px;
      border-radius: 50%;
      background: var(--blue-2);
      border: 0;
      box-shadow: 0 0 0 5px rgba(26, 140, 255, 0.12);
    }

    input[type="range"]::-moz-range-thumb {
      width: 17px;
      height: 17px;
      border-radius: 50%;
      background: var(--blue-2);
      border: 0;
      box-shadow: 0 0 0 5px rgba(26, 140, 255, 0.12);
    }

    .value-box {
      min-height: 40px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(145, 174, 210, 0.22);
      border-radius: 8px;
      background: rgba(4, 14, 27, 0.62);
      color: #f8fbff;
      font-size: 18px;
    }

    .placement-summary {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(145, 174, 210, 0.2);
      color: var(--muted);
      font-size: 15px;
    }

    .placement-summary strong {
      color: var(--blue-2);
      font-weight: 750;
    }

    .brand-card {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .ghost-button {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      border: 1px solid rgba(180, 206, 238, 0.26);
      border-radius: 8px;
      background: rgba(7, 17, 31, 0.52);
      color: #e9f2ff;
      padding: 0 15px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
    }

    .brand-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(90px, 1fr));
      column-gap: 28px;
      row-gap: 34px;
      align-items: end;
      padding: 18px 2px 22px;
    }

    .color-field {
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .color-field .label {
      text-align: center;
      color: #c8d4e4;
    }

    .swatch {
      min-height: 46px;
      border-radius: 8px;
      border: 2px solid rgba(179, 207, 238, 0.35);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        0 8px 20px rgba(0, 0, 0, 0.18);
    }

    .swatch.panel {
      background: var(--panel-color);
    }

    .swatch.ok {
      background: var(--ok);
    }

    .swatch.warn {
      background: var(--warn);
    }

    .swatch.over {
      background: var(--danger);
    }

    .brand-divider {
      height: 1px;
      background: rgba(145, 174, 210, 0.2);
      margin: 2px 0 24px;
    }

    .advanced-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 16px;
      margin-bottom: 24px;
    }

    .advanced-controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      margin-bottom: 34px;
    }

    .mini-slider-row {
      display: grid;
      grid-template-columns: 1fr 68px;
      align-items: center;
      gap: 14px;
    }

    .mini-control {
      display: grid;
      gap: 12px;
    }

    .mini-control .value-box {
      font-size: 15px;
      min-height: 38px;
    }

    .checkbox-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 34px;
    }

    .check-item {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 15px;
      user-select: none;
    }

    .check-item input {
      width: 22px;
      height: 22px;
      appearance: none;
      border: 1px solid rgba(174, 202, 234, 0.46);
      border-radius: 4px;
      background: rgba(7, 17, 31, 0.66);
      display: grid;
      place-items: center;
      margin: 0;
    }

    .check-item input:checked {
      background: var(--blue);
      border-color: var(--blue-2);
      box-shadow: 0 6px 18px var(--blue-glow);
    }

    .check-item input:checked::after {
      content: "✓";
      color: white;
      font-weight: 900;
      font-size: 16px;
      line-height: 1;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid rgba(145, 174, 210, 0.18);
    }

    .footer-left {
      display: flex;
      gap: 14px;
    }

    .footer .button {
      min-width: 112px;
      min-height: 48px;
    }

    .footer .button.primary {
      min-width: 172px;
    }

    @media (max-width: 980px) {
      body {
        padding: 18px;
        place-items: start center;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .placement-content {
        grid-template-columns: 1fr;
      }

      .anchor-grid {
        grid-template-columns: repeat(3, minmax(54px, 72px));
      }

      .anchor-button {
        width: 100%;
      }
    }

    @media (max-width: 620px) {
      .modal {
        padding: 18px;
      }

      .card {
        padding: 16px;
      }

      .button-row,
      .hdmi-row,
      .brand-grid,
      .advanced-controls,
      .slider-row {
        grid-template-columns: 1fr;
      }

      .brand-grid {
        gap: 18px;
      }

      .color-field .label {
        text-align: left;
      }

      .footer {
        align-items: stretch;
        flex-direction: column-reverse;
      }

      .footer-left {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .footer .button.primary {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="modal" aria-labelledby="dialog-title">
    <header class="modal-header">
      <h1 class="modal-title" id="dialog-title">Presenter Out / DSK</h1>
      <button class="close-button" aria-label="Close">×</button>
    </header>

    <section class="layout">
      <div class="left-stack">
        <section class="card" aria-labelledby="output-title">
          <div class="card-header">
            <div class="section-title" id="output-title">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="4" width="18" height="12" rx="1.5"></rect>
                  <path d="M8 21h8"></path>
                  <path d="M12 16v5"></path>
                </svg>
              </span>
              Output
            </div>
          </div>

          <div class="field-group">
            <label class="label" for="display-profile">Display Profile</label>
            <div class="select-wrap">
              <select id="display-profile">
                <option>Chroma DSK (green key background)</option>
                <option>Transparent DSK</option>
                <option>Program Composite</option>
              </select>
            </div>
          </div>

          <div class="button-row">
            <button class="button secondary">Open Classic Presenter</button>
            <button class="button primary">Open DSK Presenter</button>
          </div>

          <div class="field-group">
            <label class="label" for="hdmi-output">HDMI Output</label>
            <div class="hdmi-row">
              <div class="select-wrap">
                <select id="hdmi-output">
                  <option>HDMI: Classic Presenter</option>
                  <option>HDMI: DSK Presenter</option>
                  <option>HDMI: Program Output</option>
                </select>
              </div>
              <button class="button apply">
                <span aria-hidden="true">⟳</span>
                Apply HDMI View
              </button>
            </div>
            <p class="hint">Applying HDMI view will restart the output.</p>
          </div>
        </section>

        <section class="card" aria-labelledby="placement-title">
          <div class="card-header">
            <div class="section-title" id="placement-title">
              <span class="icon" aria-hidden="true">▦</span>
              Presenter Placement
            </div>
          </div>

          <div class="placement-content">
            <div class="anchor-grid" aria-label="Presenter placement">
              <button class="anchor-button" aria-label="Top left">↖</button>
              <button class="anchor-button" aria-label="Top">↑</button>
              <button class="anchor-button" aria-label="Top right">↗</button>
              <button class="anchor-button" aria-label="Left">←</button>
              <button class="anchor-button active" aria-label="Center">•</button>
              <button class="anchor-button" aria-label="Right">→</button>
              <button class="anchor-button" aria-label="Bottom left">↙</button>
              <button class="anchor-button" aria-label="Bottom">↓</button>
              <button class="anchor-button" aria-label="Bottom right">↘</button>
            </div>

            <div class="slider-stack">
              <div class="slider-row">
                <div class="slider-main">
                  <label class="label" for="scale">Scale</label>
                  <input id="scale" type="range" min="50" max="150" value="100" />
                </div>
                <div class="value-box">100%</div>
              </div>

              <div class="slider-row">
                <div class="slider-main">
                  <label class="label" for="margin">Margin</label>
                  <input id="margin" type="range" min="0" max="64" value="24" />
                </div>
                <div class="value-box">24 px</div>
              </div>
            </div>
          </div>

          <div class="placement-summary">
            Position: <strong>Center</strong>
            <span aria-hidden="true">&nbsp; • &nbsp;</span>
            Scale: 100%
            <span aria-hidden="true">&nbsp; • &nbsp;</span>
            Margin: 24 px
          </div>
        </section>
      </div>

      <section class="card brand-card" aria-labelledby="brand-title">
        <div>
          <div class="card-header">
            <div class="section-title" id="brand-title">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M15 5l4 4"></path>
                  <path d="M13 7l4 4"></path>
                  <path d="M4 20c2 0 4-.7 5.3-2L18 9.3a2.1 2.1 0 0 0-3-3L6.3 15C5 16.3 4.3 18 4 20z"></path>
                  <path d="M4 20h4"></path>
                </svg>
              </span>
              DSK Branding
            </div>
            <button class="ghost-button">
              <span aria-hidden="true">⟲</span>
              Load Default Colors
            </button>
          </div>

          <div class="brand-grid">
            <div class="color-field">
              <span class="label">Panel</span>
              <span class="swatch panel" aria-label="Panel color"></span>
            </div>
            <div class="color-field">
              <span class="label">OK</span>
              <span class="swatch ok" aria-label="OK color"></span>
            </div>
            <div class="color-field">
              <span class="label">Warn</span>
              <span class="swatch warn" aria-label="Warn color"></span>
            </div>
            <div class="color-field">
              <span class="label">Over</span>
              <span class="swatch over" aria-label="Over color"></span>
            </div>
            <div class="color-field">
              <span class="label">Progress OK</span>
              <span class="swatch ok" aria-label="Progress OK color"></span>
            </div>
            <div class="color-field">
              <span class="label">Progress Warn</span>
              <span class="swatch warn" aria-label="Progress Warn color"></span>
            </div>
            <div class="color-field">
              <span class="label">Progress Over</span>
              <span class="swatch over" aria-label="Progress Over color"></span>
            </div>
          </div>

          <div class="brand-divider"></div>

          <div class="advanced-header">
            <span>Advanced</span>
            <span aria-hidden="true">⌃</span>
          </div>

          <div class="advanced-controls">
            <div class="mini-control">
              <label class="label" for="radius">Radius</label>
              <div class="mini-slider-row">
                <input id="radius" type="range" min="0" max="24" value="8" />
                <div class="value-box">8 px</div>
              </div>
            </div>

            <div class="mini-control">
              <label class="label" for="pad-vh">Pad VH</label>
              <div class="mini-slider-row">
                <input id="pad-vh" type="range" min="0" max="32" value="12" />
                <div class="value-box">12 px</div>
              </div>
            </div>

            <div class="mini-control">
              <label class="label" for="pad-vw">Pad VW</label>
              <div class="mini-slider-row">
                <input id="pad-vw" type="range" min="0" max="32" value="12" />
                <div class="value-box">12 px</div>
              </div>
            </div>
          </div>

          <div class="checkbox-row">
            <label class="check-item">
              <input type="checkbox" />
              Transparent panel
            </label>
            <label class="check-item">
              <input type="checkbox" checked />
              Show progress bar
            </label>
          </div>
        </div>
      </section>
    </section>

    <footer class="footer">
      <div class="footer-left">
        <button class="button secondary">Cancel</button>
        <button class="button secondary">Reset</button>
      </div>
      <button class="button primary">Save Changes</button>
    </footer>
  </main>
</body>
</html>
