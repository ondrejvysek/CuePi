<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta
			http-equiv="Content-Security-Policy"
			content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none';"
		/>
		<title>Presenter Out / DSK</title>
		<link rel="stylesheet" href="./moderator.css" />
	</head>
	<body>
		<main class="modal" aria-labelledby="dialog-title">
			<header class="modal-header">
				<h1 class="modal-title" id="dialog-title">Presenter Out / DSK</h1>
				<button class="close-button" id="closeApp" aria-label="Close">×</button>
			</header>

			<section class="layout">
				<div class="left-stack">
					<section class="card" aria-labelledby="output-title">
						<div class="card-header">
							<div class="section-title" id="output-title">
								<span class="icon" aria-hidden="true">
									<svg
										viewBox="0 0 24 24"
										width="24"
										height="24"
										fill="none"
										stroke="currentColor"
										stroke-width="2"
									>
										<rect x="3" y="4" width="18" height="12" rx="1.5"></rect>
										<path d="M8 21h8"></path>
										<path d="M12 16v5"></path>
									</svg>
								</span>
								Output
							</div>
						</div>

						<div class="field-group">
							<label class="label" for="display-profile">Display Profile</label>
							<div class="select-wrap">
								<select id="display-profile">
									<option>Chroma DSK green key background</option>
									<option>Transparent DSK</option>
									<option>Program Composite</option>
								</select>
							</div>
						</div>

						<div class="field-group">
							<label class="label" for="hdmi-output">HDMI Output</label>
							<div class="hdmi-row">
								<div class="select-wrap">
									<select id="hdmi-output">
										<option>HDMI Classic Presenter</option>
										<option>HDMI DSK Presenter</option>
										<!-- <option>HDMI Program Output</option> -->
									</select>
								</div>
								<button class="button apply" type="button">
									<span aria-hidden="true">⟳</span>
									Apply HDMI View
								</button>
							</div>
							<p class="hint">
								Applying HDMI view will restart the Raspberry Pi output.
							</p>
						</div>

						<div class="output-divider"></div>

						<div class="sub-header">
							<div class="sub-title">Computer DSK Output</div>
							<div class="status-actions">
								<button
									class="icon-button"
									id="refreshScreens"
									aria-label="Refresh screens"
									type="button"
								>
									⟳
								</button>
								<div class="live-status hidden" id="dskStatus">
									<span class="status-dot"></span> DSK hidden
								</div>
							</div>
						</div>

						<div
							class="screen-picker"
							id="screenPicker"
							aria-label="Computer display selection"
						></div>
					</section>
				</div>

				<div class="right-stack">
					<section class="card brand-card" aria-labelledby="brand-title">
						<div>
							<div class="card-header">
								<div class="section-title" id="brand-title">
									<span class="icon" aria-hidden="true">
										<svg
											viewBox="0 0 24 24"
											width="24"
											height="24"
											fill="none"
											stroke="currentColor"
											stroke-width="2"
										>
											<path d="M15 5l4 4"></path>
											<path d="M13 7l4 4"></path>
											<path
												d="M4 20c2 0 4-.7 5.3-2L18 9.3a2.1 2.1 0 0 0-3-3L6.3 15C5 16.3 4.3 18 4 20z"
											></path>
											<path d="M4 20h4"></path>
										</svg>
									</span>
									Branding
								</div>
								<button class="ghost-button" type="button">
									<span aria-hidden="true">⟲</span>Use Defaults
								</button>
							</div>

							<div class="brand-grid">
								<div class="color-field">
									<span class="label">Panel</span
									><span class="swatch panel" aria-label="Panel color"></span>
								</div>
								<div class="color-field">
									<span class="label">OK</span
									><span class="swatch ok" aria-label="OK color"></span>
								</div>
								<div class="color-field">
									<span class="label">Warn</span
									><span class="swatch warn" aria-label="Warn color"></span>
								</div>
								<div class="color-field">
									<span class="label">Over</span
									><span class="swatch over" aria-label="Over color"></span>
								</div>
								<div class="color-field">
									<span class="label">Progress OK</span
									><span
										class="swatch ok"
										aria-label="Progress OK color"
									></span>
								</div>
								<div class="color-field">
									<span class="label">Progress Warn</span
									><span
										class="swatch warn"
										aria-label="Progress Warn color"
									></span>
								</div>
								<div class="color-field">
									<span class="label">Progress Over</span
									><span
										class="swatch over"
										aria-label="Progress Over color"
									></span>
								</div>
							</div>

							<div class="brand-divider"></div>

							<div class="advanced-controls">
								<div class="mini-control">
									<label class="label" for="radius">Radius</label>
									<div class="mini-slider-row">
										<input
											id="radius"
											type="range"
											min="0"
											max="24"
											value="8"
										/>
										<div class="value-box">8 px</div>
									</div>
								</div>
								<div class="mini-control">
									<label class="label" for="pad-vh">↕ Padding</label>
									<div class="mini-slider-row">
										<input
											id="pad-vh"
											type="range"
											min="0"
											max="32"
											value="12"
										/>
										<div class="value-box">12 px</div>
									</div>
								</div>
								<div class="mini-control">
									<label class="label" for="pad-vw">↔ Padding</label>
									<div class="mini-slider-row">
										<input
											id="pad-vw"
											type="range"
											min="0"
											max="32"
											value="12"
										/>
										<div class="value-box">12 px</div>
									</div>
								</div>
							</div>

							<div class="checkbox-row">
								<label class="check-item"
									><input type="checkbox" />Transparent panel</label
								>
								<label class="check-item"
									><input type="checkbox" checked />Show progress bar</label
								>
							</div>
						</div>
					</section>

					<section class="card" aria-labelledby="placement-title">
						<div class="card-header">
							<div class="section-title" id="placement-title">
								<span class="icon" aria-hidden="true">▦</span>Presenter
								Placement
							</div>
						</div>
						<div class="placement-content">
							<div class="anchor-grid" aria-label="Presenter placement">
								<button class="anchor-button" aria-label="Top left">↖</button
								><button class="anchor-button" aria-label="Top">↑</button
								><button class="anchor-button" aria-label="Top right">↗</button>
								<button class="anchor-button" aria-label="Left">←</button
								><button class="anchor-button active" aria-label="Center">
									•</button
								><button class="anchor-button" aria-label="Right">→</button>
								<button class="anchor-button" aria-label="Bottom left">↙</button
								><button class="anchor-button" aria-label="Bottom">↓</button
								><button class="anchor-button" aria-label="Bottom right">
									↘
								</button>
							</div>
							<div class="slider-stack compact">
								<div class="slider-row">
									<div class="slider-main">
										<label class="label" for="scale">Scale</label
										><input
											id="scale"
											type="range"
											min="50"
											max="150"
											value="100"
										/>
									</div>
									<div class="value-box">100%</div>
								</div>
								<div class="slider-row">
									<div class="slider-main">
										<label class="label" for="margin">Margin</label
										><input
											id="margin"
											type="range"
											min="0"
											max="64"
											value="24"
										/>
									</div>
									<div class="value-box">24 px</div>
								</div>
							</div>
						</div>
						<div class="placement-summary">
							Position: <strong>Center</strong
							><span aria-hidden="true">&nbsp; • &nbsp;</span>Scale: 100%<span
								aria-hidden="true"
								>&nbsp; • &nbsp;</span
							>Margin: 24 px
						</div>
					</section>
				</div>
			</section>

			<footer class="footer">
				<div class="footer-left">
					<button class="button secondary" type="button">Cancel</button
					><button class="button secondary" type="button">Reset</button>
				</div>
				<button class="button primary" type="button">Save Changes</button>
			</footer>
		</main>
		<script src="./moderator.js"></script>
	</body>
</html>
