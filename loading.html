<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CuePi - Loading</title>
    <style>
        body { 
            background: #000; 
            color: #22c55e; 
            font-family: sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-size: 4vw; 
            font-weight: bold; 
            text-align: center;
        }
        @keyframes pulse { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0.3; } 
        }
        .text { animation: pulse 2s infinite; }
        .diag {
            position: fixed;
            left: 24px;
            right: 24px;
            bottom: 24px;
            font-size: 1.6vw;
            color: #93c5fd;
            font-family: monospace;
            text-align: center;
            opacity: 0.9;
        }
    </style>
    <script>
        function setBootDiag(text) {
            const el = document.getElementById('boot-diag');
            if (el) el.innerText = text;
        }

        async function probeApiOrigins() {
            const candidates = ['http://localhost:3000', 'http://127.0.0.1:3000'];
            for (const origin of candidates) {
                try {
                    setBootDiag(`Checking API: ${origin}/api/state`);
                    const response = await fetch(`${origin}/api/state`);
                    if (response.ok) {
                        setBootDiag(`API online at ${origin}`);
                        return origin;
                    }
                } catch (_) {}
            }
            setBootDiag('API not reachable yet. Retrying...');
            return null;
        }

        async function checkServer() {
            const apiOrigin = await probeApiOrigins();
            if (!apiOrigin) {
                setTimeout(checkServer, 1000);
                return;
            }
            setBootDiag(`Launching presenter: ${apiOrigin}/presenter.html`);
            window.location.replace(`${apiOrigin}/presenter.html`);
        }
        // Start polling 1 second after launch
        setBootDiag('Initializing boot checks...');
        setTimeout(checkServer, 1000);
    </script>
</head>
<body>
    <div class="text">INITIALIZING CUEPI...</div>
    <div id="boot-diag" class="diag">Starting...</div>
</body>
</html>
