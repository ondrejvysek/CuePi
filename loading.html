<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CuePi - Loading</title>
    <style>
        body { 
            background: #000; 
            color: #22c55e; 
            font-family: sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            font-size: 4vw; 
            font-weight: bold; 
            text-align: center;
        }
        @keyframes pulse { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0.3; } 
        }
        .text { animation: pulse 2s infinite; }
    </style>
    <script>
        async function resolvePresenterUrl() {
            const candidates = [
                'http://localhost:3000/presenter.html',
                'http://127.0.0.1:3000/presenter.html',
                'http://localhost:3000/public/presenter.html'
            ];

            for (const candidate of candidates) {
                try {
                    const check = await fetch(candidate, { method: 'HEAD' });
                    if (check.ok) return candidate;
                } catch (_) {}
            }

            return candidates[0];
        }

        function checkServer() {
            fetch('http://localhost:3000/api/state')
                .then(async (response) => {
                    if (!response.ok) {
                        setTimeout(checkServer, 1000);
                        return;
                    }
                    const presenterUrl = await resolvePresenterUrl();
                    window.location.replace(presenterUrl);
                })
                .catch(() => setTimeout(checkServer, 1000));
        }
        // Start polling 1 second after launch
        setTimeout(checkServer, 1000);
    </script>
</head>
<body>
    <div class="text">INITIALIZING CUEPI...</div>
</body>
</html>
